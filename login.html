<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 md:p-10 rounded-xl shadow-sm border border-gray-100 w-full max-w-md text-center">
        <img src="assets/github-logo.png" alt="GitHub" class="w-16 mx-auto mb-4">
        <h1 class="text-xl md:text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-sm mb-8">Sign in to manage your issues</p>

        <form id="loginForm" class="space-y-5 text-left">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <span class="text-[10px] text-indigo-600">Default: admin</span>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <span class="text-[10px] text-indigo-600">Default: admin123</span>
            </div>
            <button type="submit" class="w-full bg-[#5D2BFF] text-white py-2.5 rounded-md font-bold hover:bg-indigo-700 transition">Sign In</button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100">
            <p class="text-xs text-gray-400 mb-4 font-semibold uppercase tracking-wider">OR</p>
            <div class="bg-gray-50 p-4 rounded-lg">
                <p class="text-xs text-gray-500">Demo Credentials:</p>
                <p class="text-sm font-bold text-gray-700">Username: admin</p>
                <p class="text-sm font-bold text-gray-700">Password: admin123</p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                alert('Invalid Credentials');
            }
        });
    </script>
</body>
</html>
