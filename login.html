<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-gray-100 w-full max-w-[450px] text-center">
        <img src="assets/github-logo.png" alt="GitHub" class="w-20 mx-auto mb-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
        <p class="text-gray-400 text-sm mb-10">Sign in to manage your issues</p>

        <form id="loginForm" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-gray-50/50">
                <p class="text-[11px] text-[#5D2BFF] mt-1 font-medium">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-gray-50/50">
                <p class="text-[11px] text-[#5D2BFF] mt-1 font-medium">Default: admin123</p>
            </div>
            <button type="submit" class="w-full bg-[#5D2BFF] text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Sign In</button>
        </form>

        <div class="mt-10 pt-8 border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-4">OR</p>
            <div class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-200">
                <p class="text-[11px] text-gray-400 mb-1">Demo Credentials:</p>
                <p class="text-sm font-bold text-gray-700">Username: <span class="text-gray-900">admin</span></p>
                <p class="text-sm font-bold text-gray-700">Password: <span class="text-gray-900">admin123</span></p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
