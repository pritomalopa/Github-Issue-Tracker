<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GitHub Issues</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #5D2BFF !important; color: white !important; border-color: #5D2BFF !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <nav class="bg-white border-b border-gray-100 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-[1440px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" alt="Logo" class="w-9">
                <span class="font-extrabold text-xl tracking-tight text-gray-900">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-4 w-full md:w-2/3 lg:w-1/2">
                <div class="relative w-full">
                    <span class="absolute left-4 top-3 text-gray-400">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search issues by title or description..." class="w-full pl-12 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-100 transition text-sm">
                </div>
                <button class="bg-[#5D2BFF] text-white px-6 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap hover:bg-indigo-700 transition shadow-md shadow-indigo-100">+ New Issue</button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1440px] mx-auto p-6">
        <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm mb-8 flex gap-3 overflow-x-auto">
            <button onclick="filterByStatus('all')" id="tab-all" class="px-10 py-2.5 rounded-xl text-sm font-bold border border-gray-100 text-gray-500 active-tab transition-all">All</button>
            <button onclick="filterByStatus('open')" id="tab-open" class="px-10 py-2.5 rounded-xl text-sm font-bold border border-gray-100 text-gray-500 transition-all">Open</button>
            <button onclick="filterByStatus('closed')" id="tab-closed" class="px-10 py-2.5 rounded-xl text-sm font-bold border border-gray-100 text-gray-500 transition-all">Closed</button>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-10 flex flex-col sm:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-5">
                <div class="p-3 bg-indigo-50 rounded-2xl">
                    <img src="assets/Aperture.png" alt="Aperture" class="w-8">
                </div>
                <div>
                    <h2 class="text-2xl font-black text-gray-900"><span id="countText">0</span> Issues</h2>
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest">Live Project Monitoring</p>
                </div>
            </div>
            <div class="flex gap-8 text-xs font-bold uppercase tracking-widest text-gray-500">
                <span class="flex items-center gap-3"><img src="assets/Open-Status.png" class="w-5"> <span class="text-green-500">Open</span></span>
                <span class="flex items-center gap-3"><img src="assets/Closed-Status.png" class="w-5"> <span class="text-[#5D2BFF]">Closed</span></span>
            </div>
        </div>

        <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[32px] max-w-2xl w-full p-10 shadow-2xl relative animate-in fade-in zoom-in duration-200">
            <div id="modalBody"></div>
            <div class="mt-10 flex justify-end">
                <button onclick="closeModal()" class="bg-[#5D2BFF] text-white px-12 py-3 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-indigo-700 transition">Close</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
