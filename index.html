<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #5D2BFF !important; color: white !important; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-10">
    <nav class="bg-white border-b border-gray-100 px-4 md:px-8 py-4 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" alt="Logo" class="w-8">
                <span class="font-bold text-lg text-gray-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-3 w-full md:w-1/2 lg:w-1/3">
                <div class="relative w-full">
                    <span class="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search issues..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-400 text-sm">
                </div>
                <button class="bg-[#5D2BFF] text-white px-4 py-2 rounded-md font-medium text-xs md:text-sm whitespace-nowrap">+ New Issue</button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto mt-6 md:mt-8 px-4 md:px-6">
        <div class="bg-white p-2 md:p-4 rounded-xl border border-gray-100 shadow-sm mb-6 flex overflow-x-auto gap-2 md:gap-4 scrollbar-hide">
            <button onclick="filterByStatus('all')" id="tab-all" class="flex-1 md:flex-none px-6 md:px-10 py-2 rounded-md text-xs md:text-sm font-medium border text-gray-600 active-tab transition">All</button>
            <button onclick="filterByStatus('open')" id="tab-open" class="flex-1 md:flex-none px-6 md:px-10 py-2 rounded-md text-xs md:text-sm font-medium border text-gray-600 transition">Open</button>
            <button onclick="filterByStatus('closed')" id="tab-closed" class="flex-1 md:flex-none px-6 md:px-10 py-2 rounded-md text-xs md:text-sm font-medium border text-gray-600 transition">Closed</button>
        </div>

        <div class="bg-white p-4 md:p-6 rounded-xl border border-gray-100 shadow-sm mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="assets/aperture.png" alt="Aperture" class="w-10 p-2 bg-indigo-50 rounded-full">
                <div>
                    <h2 class="text-lg md:text-xl font-bold text-gray-800"><span id="countText">0</span> Issues</h2>
                    <p class="text-[10px] md:text-xs text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 md:gap-6 text-xs md:text-sm font-semibold">
                <span class="flex items-center gap-2"><img src="assets/open-status.png" class="w-4"> Open</span>
                <span class="flex items-center gap-2"><img src="assets/closed-status.png" class="w-4"> Closed</span>
            </div>
        </div>

        <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-6 md:p-10 shadow-2xl relative animate-in fade-in zoom-in duration-200">
            <div id="modalBody"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="closeModal()" class="bg-[#5D2BFF] text-white px-8 py-2.5 rounded-lg font-bold text-sm">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
